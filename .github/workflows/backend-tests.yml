name: Backend Tests
run-name: ${{github.actor}} is making tests
on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]
jobs: 
  test: 
    runs-on: unbutu-latest
    steps: 
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: 
          java-version: '17'
          distribuiton: 'temurin'
          cache: maven
      - name: Run the Maven verify phase
        run:
          cd bookservice
          mvn clean verify
